services:
  backend:
    build: .
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN}
      MASTER_PASSWORD_HASH: ${MASTER_PASSWORD_HASH}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_SECRET: ${SERVER_SECRET}
      DB_PATH: /app/data/app.db
    volumes:
      - nxtdns-data:/app/data
    restart: unless-stopped

volumes:
  nxtdns-data:
