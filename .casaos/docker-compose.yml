services:
  app:
    image: dheerusuthar/nxt2nxtdns:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      MASTER_PASSWORD: ${MASTER_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DB_PATH: /app/data/app.db
    volumes:
      - nxtdns-data:/app/data
    x-casaos-portainer: true

volumes:
  nxtdns-data:
    driver: local

x-casaos-title: NextDNS Multi-Account Manager
x-casaos-description: |
  Manage multiple NextDNS accounts and profiles from a single web interface.
  Configure port mapping, set up scheduled profile swaps, and monitor account activity.
x-casaos-category: Network Management
x-casaos-icon: https://raw.githubusercontent.com/dheerusuthar/nxt2nxtdns/main/.casaos/icon.png
x-casaos-author: Dheeraj
x-casaos-developer_url: https://github.com/dheeraj237/nxt2nxtdns
x-casaos-app_id: nxt2nxtdns
x-casaos-port_map: "3000"
