services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      MASTER_PASSWORD: ${MASTER_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DB_PATH: /app/data/app.db
    volumes:
      - nxtdns-data:/app/data
    restart: unless-stopped

volumes:
  nxtdns-data:
